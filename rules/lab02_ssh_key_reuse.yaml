name: ssh_private_key_read
description: >
  A process opened an SSH private key file for reading.
  Legitimate use of a private key goes through ssh-agent or a direct
  ssh invocation — raw reading of the key file (e.g. via cat, cp, scp)
  strongly suggests exfiltration for reuse on another host.
severity: HIGH
mitre: T1552.004
any:
  - event_type: file_open
    file_path: "/root/.ssh/id_rsa"
    file_op: read
  - event_type: file_open
    file_path: "/root/.ssh/id_ed25519"
    file_op: read
  - event_type: file_open
    file_path: "/home/*/.ssh/id_rsa"
    file_op: read
  - event_type: file_open
    file_path: "/home/*/.ssh/id_ed25519"
    file_op: read
