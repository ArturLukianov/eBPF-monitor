name: couchdb_shell_execution
description: >
  The CouchDB Erlang runtime (beam.smp) executed a shell binary.
  The Erlang VM has no legitimate reason to spawn an OS shell.
  This is the eBPF fingerprint of the CouchDB os_daemons RCE technique:
  the attacker registers a shell command as a CouchDB OS daemon via the
  _config API ("PUT /_node/nonode@nohost/_config/os_daemons/..."),
  causing beam.smp to execve the command directly. An equivalent signal
  appears with the query_server technique where a design document view
  triggers child_process.execSync() inside the Erlang-hosted JS runtime.
  Covers Lab 09.
severity: CRITICAL
mitre: T1059
any:
  - event_type: exec
    src_process: "beam.smp"
    exec_path: "/bin/sh"
  - event_type: exec
    src_process: "beam.smp"
    exec_path: "/bin/bash"
  - event_type: exec
    src_process: "beam.smp"
    exec_path: "/usr/bin/bash"
